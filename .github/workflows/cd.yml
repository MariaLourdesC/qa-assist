name: CD — Deploy to VPS

on:
  workflow_dispatch:       # Solo se ejecuta cuando lo triggerean manualmente
    inputs:
      confirm:
        description: '¿Confirmar deploy a producción? (escribí "deploy")'
        required: true
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ── Validar input ─────────────────────────────────────────────────────────
  validate:
    name: Validar confirmación
    runs-on: ubuntu-latest
    steps:
      - name: Verificar confirmación
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "deploy" ]]; then
            echo "❌ Confirmación inválida. Escribí exactamente 'deploy' para continuar."
            exit 1
          fi
          echo "✅ Confirmación válida. Iniciando deploy..."

  # ── Resumen del cambio ────────────────────────────────────────────────────
  preview:
    name: Resumen del cambio
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Commits en este deploy
        run: |
          echo "### Commits a deployar" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Hash | Mensaje | Autor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|-------|" >> $GITHUB_STEP_SUMMARY
          git log --oneline -10 --pretty="| \`%h\` | %s | %an |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Disparado por:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # ── Deploy con aprobación manual ──────────────────────────────────────────
  deploy:
    name: Deploy a producción
    needs: preview
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}

            echo "=== Pull ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Build ==="
            docker compose build --no-cache

            echo "=== Deploy ==="
            docker compose up -d --remove-orphans

            echo "=== Healthcheck ==="
            sleep 8
            STATUS=$(docker compose exec -T backend wget -qO- http://localhost:3001/api/health)
            echo "$STATUS"
            echo "$STATUS" | grep -q '"status":"ok"' || exit 1

            echo "=== Cleanup ==="
            docker image prune -f

      - name: Resumen del deploy
        run: |
          echo "## ✅ Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Disparado por | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fecha | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
