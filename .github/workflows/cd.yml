name: CD — Deploy to VPS

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ── Resumen del cambio ────────────────────────────────────────────────────
  preview:
    name: Resumen del cambio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Commits incluidos en este deploy
        run: |
          echo "### Commits a deployar" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Hash | Mensaje | Autor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|-------|" >> $GITHUB_STEP_SUMMARY
          git log --oneline -10 --pretty="| \`%h\` | %s | %an |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\` · **Autor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # ── Verificar que los secrets del VPS están configurados ─────────────────
  check-secrets:
    name: Verificar secrets del VPS
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Verificar secrets
        id: check
        env:
          HAS_HOST: ${{ secrets.VPS_HOST != '' }}
          HAS_USER: ${{ secrets.VPS_USER != '' }}
          HAS_KEY:  ${{ secrets.VPS_SSH_KEY != '' }}
          HAS_PATH: ${{ secrets.VPS_PATH != '' }}
        run: |
          if [[ "$HAS_HOST" == "true" && "$HAS_USER" == "true" && "$HAS_KEY" == "true" && "$HAS_PATH" == "true" ]]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✅ Todos los secrets del VPS están configurados." >> $GITHUB_STEP_SUMMARY
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "## ⚠️ Deploy saltado — secrets no configurados" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Para activar el deploy automático, configurá estos secrets en:" >> $GITHUB_STEP_SUMMARY
            echo "**Settings → Secrets → Actions**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Secret | Estado |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| VPS_HOST | $( [[ "$HAS_HOST" == "true" ]] && echo "✅" || echo "❌ Falta" ) |" >> $GITHUB_STEP_SUMMARY
            echo "| VPS_USER | $( [[ "$HAS_USER" == "true" ]] && echo "✅" || echo "❌ Falta" ) |" >> $GITHUB_STEP_SUMMARY
            echo "| VPS_SSH_KEY | $( [[ "$HAS_KEY" == "true" ]] && echo "✅" || echo "❌ Falta" ) |" >> $GITHUB_STEP_SUMMARY
            echo "| VPS_PATH | $( [[ "$HAS_PATH" == "true" ]] && echo "✅" || echo "❌ Falta" ) |" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Deploy real ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy a producción
    needs: [preview, check-secrets]
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}

            echo "=== Pull ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Build ==="
            docker compose build --no-cache

            echo "=== Deploy ==="
            docker compose up -d --remove-orphans

            echo "=== Healthcheck ==="
            sleep 8
            STATUS=$(docker compose exec -T backend wget -qO- http://localhost:3001/api/health)
            echo "$STATUS"
            echo "$STATUS" | grep -q '"status":"ok"' || exit 1

            echo "=== Cleanup ==="
            docker image prune -f

      - name: Resumen del deploy
        run: |
          echo "## ✅ Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Aprobado por | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fecha | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
