name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: tests + security audit ──────────────────────────────────────
  backend:
    name: Backend — test & audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run tests
        working-directory: server
        run: npm test -- --reporter=verbose
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-ci
          JWT_REFRESH_SECRET: test-refresh-secret-ci

      - name: Security audit
        working-directory: server
        run: npm audit --audit-level=high
        continue-on-error: true   # warn but don't fail CI on moderate vulns

  # ── Frontend: build + lint ────────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Docker build check (sin push) ─────────────────────────────────────────
  docker-check:
    name: Docker — build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t qa-assist-backend:ci ./server

      - name: Build frontend image
        run: docker build -t qa-assist-frontend:ci ./frontend
