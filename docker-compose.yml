services:

  backend:
    build: ./server
    container_name: qa-assist-backend
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - qa_data:/app/data
      - qa_backups:/app/backups
    expose:
      - "3001"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: qa-assist-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

volumes:
  qa_data:
    driver: local
  qa_backups:
    driver: local
